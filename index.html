<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unique Vision | 李七 - 视觉创作者</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Inter:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e00;
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.6);
            --nav-bg: rgba(5,5,5,0.95);
            --transition-smooth: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            --card-radius: 20px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            line-height: 1.7;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- 导航栏优化 --- */
        nav {
            position: fixed; top: 0; width: 100%; padding: 30px 6%;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; transition: var(--transition-smooth);
        }
        nav.scrolled { 
            padding: 15px 6%; 
            background: var(--nav-bg); 
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { 
            font-family: 'Noto Serif SC', serif; 
            font-size: 1.1rem; 
            letter-spacing: 4px; 
            color: #fff; 
            text-decoration: none;
            font-weight: 700;
            z-index: 1001;
        }

        /* 移动端汉堡按钮 */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            z-index: 1001;
            padding: 10px;
        }
        .menu-toggle span {
            width: 24px;
            height: 1.5px;
            background: #fff;
            transition: var(--transition-smooth);
        }

        .nav-links { display: flex; gap: 24px; align-items: center; }
        .nav-item {
            font-size: 0.75rem; 
            letter-spacing: 1.5px;
            color: var(--text-dim);
            text-decoration: none; 
            text-transform: uppercase;
            transition: var(--transition-smooth);
            text-align: center;
        }
        .nav-item span { display: block; font-size: 0.6rem; opacity: 0.6; margin-top: 2px; }
        .nav-item:hover { color: var(--text); }

        /* --- Hero 响应式 --- */
        .hero {
            height: 100vh; 
            display: flex; 
            align-items: center; 
            padding: 0 10%;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('assets/images/IMG1.jpg') center/cover no-repeat;
            background-attachment: fixed;
        }
        .hero h1 {
            font-family: 'Noto Serif SC', serif; 
            font-size: clamp(2rem, 8vw, 4rem); 
            line-height: 1.5; 
            letter-spacing: 6px;
        }

        /* --- 布局优化 --- */
        .section { padding: 100px 10%; }
        .about-grid {
            display: grid; 
            grid-template-columns: 1fr 1.2fr; 
            gap: 80px; 
            align-items: center;
        }
        .about-img-container {
            border-radius: var(--card-radius);
            overflow: hidden;
            aspect-ratio: 3 / 4;
        }
        .about-img { width: 100%; height: 100%; object-fit: cover; }

        .about-text h2 { font-family: 'Noto Serif SC', serif; font-size: 2.2rem; margin-bottom: 25px; }

        /* --- 作品瀑布流 --- */
        .work-grid {
            column-count: 3;
            column-gap: 30px;
        }
        .work-card {
            break-inside: avoid;
            margin-bottom: 30px;
            border-radius: var(--card-radius);
            overflow: hidden; 
            cursor: pointer;
        }
        .work-card img { width: 100%; display: block; transition: transform 1s ease; }
        .work-card:active img { transform: scale(0.96); }

        /* --- 移动端适配核心 --- */
        @media (max-width: 768px) {
            nav { padding: 20px 6%; }
            .menu-toggle { display: flex; }
            
            .nav-links {
                position: fixed; top: 0; right: -100%;
                width: 80%; height: 100vh;
                background: #0a0a0a;
                flex-direction: column;
                justify-content: center;
                transition: var(--transition-smooth);
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            }
            .nav-links.active { right: 0; }
            .nav-item { font-size: 1.1rem; }
            .nav-item span { font-size: 0.8rem; }

            .hero { background-attachment: scroll; } /* 移动端禁用视差防止卡顿 */
            
            .about-grid { grid-template-columns: 1fr; gap: 40px; }
            .work-grid { column-count: 1; } /* 手机端单列显示，增加力量感 */
            
            .section { padding: 60px 8%; }
        }

        /* --- 模态框优化 --- */
        .modal {
            display: none; position: fixed; inset: 0; 
            background: #000; z-index: 2000; 
            align-items: center; justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-img { max-width: 90%; max-height: 80vh; object-fit: contain; }
        .modal-close { position: absolute; top: 30px; right: 30px; font-size: 1.5rem; color: #666; }

        /* 汉堡菜单动画效果 */
        .menu-toggle.open span:nth-child(1) { transform: translateY(7.5px) rotate(45deg); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: translateY(-7.5px) rotate(-45deg); }
    </style>
</head>
<body>

    <nav id="mainNav">
        <a href="#" class="logo">UNIQUE VISION.</a>
        <div class="menu-toggle" id="menuBtn">
            <span></span><span></span><span></span>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="#home" class="nav-item">Home<span>首頁</span></a>
            <a href="#about" class="nav-item">About<span>关于</span></a>
            <a href="#works" class="nav-item">Works<span>选集</span></a>
            <a href="photography.html" class="nav-item">Photography<span>摄影</span></a>
            <a href="video.html" class="nav-item">Video<span>摄像</span></a>
        </div>
    </nav>

    <section class="hero" id="home">
        <h1>用光影<br>縫補時間的裂縫</h1>
    </section>

    <section class="section" id="about">
        <div class="about-grid">
            <div class="about-img-container">
                <img src="assets/images/hq.png" class="about-img" alt="Profile">
            </div>
            <div class="about-text">
                <p style="color:var(--accent); font-weight:600; font-size:0.7rem; letter-spacing:3px;">PROFILO</p>
                <h2>李七 / SEVEN</h2>
                <p>視覺創作者。現居東京。</p>
                <p>專注於捕捉城市中被忽視的呼吸感。在寧缺毋濫的原則下，每一幀畫面都是對當下生活的一次誠實反饋。</p>
            </div>
        </div>
    </section>

    <section class="section" id="works">
        <h2 style="font-family:'Noto Serif SC'; margin-bottom:40px; letter-spacing:4px;">Selected Works</h2>
        <div class="work-grid" id="workGrid"></div>
    </section>

    <div id="modal" class="modal">
        <span class="modal-close" id="closeBtn">✕</span>
        <img id="modalImage" class="modal-img" src="">
    </div>

    <script>
        // 渲染作品集[cite: 1]
        const works = [
            {src: "assets/images/IMG1.jpg"}, {src: "assets/images/IMG2.jpg"},
            {src: "assets/images/IMG3.jpg"}, {src: "assets/images/IMG4.jpg"},
            {src: "assets/images/IMG5.jpg"}, {src: "assets/images/IMG6.jpg"}
        ];

        const grid = document.getElementById('workGrid');
        grid.innerHTML = works.map((w, i) => `
            <div class="work-card" onclick="openModal('${w.src}')">
                <img src="${w.src}" loading="lazy">
            </div>
        `).join('');

        // 移动端菜单控制
        const menuBtn = document.getElementById('menuBtn');
        const navLinks = document.getElementById('navLinks');
        
        menuBtn.onclick = () => {
            menuBtn.classList.toggle('open');
            navLinks.classList.toggle('active');
        };

        // 点击导航项自动关闭菜单
        document.querySelectorAll('.nav-item').forEach(link => {
            link.onclick = () => {
                menuBtn.classList.remove('open');
                navLinks.classList.remove('active');
            };
        });

        // 滚动效果
        window.onscroll = () => {
            document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 50);
        };

        // 模态框逻辑
        const modal = document.getElementById('modal');
        const modalImg = document.getElementById('modalImage');
        
        window.openModal = (src) => {
            modalImg.src = src;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        };

        document.getElementById('closeBtn').onclick = () => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        // 移动端手势：下滑关闭模态框
        let startY = 0;
        modal.ontouchstart = (e) => startY = e.touches[0].clientY;
        modal.ontouchend = (e) => {
            if (e.changedTouches[0].clientY - startY > 100) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        };
    </script>
</body>
</html>
