<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Unique Vision | 李七 - 视觉创作者</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600&family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff3e00;
            --text: #ffffff;
            --text-dim: rgba(255,255,255,0.4);
            --nav-h: 70px;
        }

        * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', -apple-system, sans-serif; 
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* --- 响应式导航 --- */
        nav {
            position: fixed; top: 0; width: 100%; height: var(--nav-h);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 6%; z-index: 1000; transition: 0.4s ease;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }
        nav.scrolled { 
            background: rgba(5,5,5,0.95); 
            backdrop-filter: blur(15px);
            height: 60px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo { 
            font-family: 'Noto Serif SC', serif; font-size: 1rem; 
            letter-spacing: 3px; font-weight: 600; text-decoration: none; color: #fff;
        }

        /* 移动端菜单按钮 */
        .menu-toggle {
            display: flex; flex-direction: column; gap: 5px; cursor: pointer; padding: 10px;
        }
        .menu-toggle span { width: 20px; height: 1.5px; background: #fff; transition: 0.3s; }

        /* 全屏菜单覆盖层 */
        .full-menu {
            position: fixed; inset: 0; background: #000; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            gap: 35px; clip-path: circle(0% at 90% 5%); transition: 0.6s cubic-bezier(0.7, 0, 0.3, 1);
        }
        .full-menu.active { clip-path: circle(150% at 90% 5%); }
        .full-menu a {
            color: #fff; text-decoration: none; font-size: 1.6rem; 
            font-family: 'Noto Serif SC', serif; letter-spacing: 4px;
        }
        .full-menu a span { display: block; font-size: 0.7rem; opacity: 0.4; text-align: center; margin-top: 5px; letter-spacing: 2px; }

        /* --- Hero 区域 --- */
        .hero {
            height: 100vh; width: 100%; position: relative;
            display: flex; align-items: center; justify-content: center;
            background: url('https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=1200') center/cover no-repeat;
        }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .hero-content { position: relative; text-align: center; width: 80%; }
        .hero-content h1 {
            font-family: 'Noto Serif SC', serif; font-size: 2.2rem;
            letter-spacing: 6px; line-height: 1.5; font-weight: 300;
        }

        /* --- 内容区块 --- */
        .section { padding: 80px 8%; }
        .about-text h2 { font-family: 'Noto Serif SC', serif; font-size: 1.8rem; margin-bottom: 25px; border-left: 2px solid var(--accent); padding-left: 15px; }
        .about-text p { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 20px; font-weight: 300; }

        /* --- 移动端瀑布流 --- */
        .work-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .work-card { 
            position: relative; border-radius: 4px; overflow: hidden; 
            aspect-ratio: 4/5; background: #111; 
        }
        .work-card img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .work-card:active img { transform: scale(0.97); } /* 触压反馈 */

        /* --- 底部快速入口 --- */
        .quick-nav {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 40px;
        }
        .btn {
            border: 1px solid rgba(255,255,255,0.15); padding: 15px; text-align: center;
            text-decoration: none; color: #fff; font-size: 0.75rem; letter-spacing: 2px;
            background: rgba(255,255,255,0.03); border-radius: 2px;
        }

        footer { padding: 60px 8%; text-align: center; opacity: 0.5; font-size: 0.65rem; letter-spacing: 1px; }

        /* 桌面端补丁 */
        @media (min-width: 769px) {
            .work-grid { grid-template-columns: repeat(3, 1fr); }
            .hero-content h1 { font-size: 3.5rem; }
            .menu-toggle { display: none; }
            /* 此处可扩展 PC 端样式 */
        }
    </style>
</head>
<body>

    <nav id="nav">
        <a href="#" class="logo">UNIQUE VISION.</a>
        <div class="menu-toggle" onclick="toggleMenu()">
            <span></span><span></span>
        </div>
    </nav>

    <div class="full-menu" id="fullMenu">
        <a href="#home" onclick="toggleMenu()">HOME<span>首 页</span></a>
        <a href="#about" onclick="toggleMenu()">ABOUT<span>关 于</span></a>
        <a href="photography.html">PHOTO<span>摄 影</span></a>
        <a href="video.html">VIDEO<span>摄 像</span></a>
    </div>

    <section class="hero" id="home">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1>用光影<br>缝补时间的裂缝</h1>
        </div>
    </section>

    <section class="section" id="about">
        <div class="about-text">
            <h2>关于创作</h2>
            <p>我是李七，现居东京。在这里，我用快门和帧率记录城市缝隙中的呼吸感。</p>
            <p>我坚持“宁缺毋滥”的原则，每一份作品都是不设限想象力与极致视觉追求的产物。在这里，你将看到被重新解构的光影叙事。</p>
            
            <div class="quick-nav">
                <a href="photography.html" class="btn">进入摄影专区</a>
                <a href="video.html" class="btn">进入摄像专区</a>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="work-grid">
            <div class="work-card"><img src="https://images.unsplash.com/photo-15420518418c7-59496ba82752?auto=format&fit=crop&q=80&w=800"></div>
            <div class="work-card"><img src="https://images.unsplash.com/photo-1503899036084-c55cdd92da26?auto=format&fit=crop&q=80&w=800"></div>
            <div class="work-card"><img src="https://images.unsplash.com/photo-1524413139048-47c5957d0794?auto=format&fit=crop&q=80&w=800"></div>
        </div>
    </section>

    <footer>
        © 2026 UNIQUE VISION • SEVEN LI<br>BASED IN TOKYO
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('fullMenu').classList.toggle('active');
            // 锁定背景滚动
            document.body.style.overflow = 
                document.getElementById('fullMenu').classList.contains('active') ? 'hidden' : 'auto';
        }

        window.addEventListener('scroll', () => {
            const nav = document.getElementById('nav');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });

        // 简单的首屏入场动画
        window.onload = () => {
            document.querySelector('.hero-content').style.opacity = '0';
            document.querySelector('.hero-content').style.transform = 'translateY(20px)';
            setTimeout(() => {
                document.querySelector('.hero-content').style.transition = '1.5s ease';
                document.querySelector('.hero-content').style.opacity = '1';
                document.querySelector('.hero-content').style.transform = 'translateY(0)';
            }, 300);
        }
    </script>
</body>
</html>
