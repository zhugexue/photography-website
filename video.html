<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video | Unique Vision - 李七</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808; --accent: #ff3e00; --text: #ffffff; --text-dim: rgba(255,255,255,0.58);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; line-height: 1.8; }

        nav { position: fixed; top: 0; width: 100%; padding: 26px 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(8,8,8,0.94); backdrop-filter: blur(16px); }
        .logo { font-family: 'Noto Serif SC', serif; font-size: 1.45rem; letter-spacing: 4px; color: #fff; text-decoration: none; }
        .nav-item { font-size: 0.85rem; letter-spacing: 2.6px; color: var(--text-dim); text-decoration: none; margin: 0 20px; }
        .nav-item.active { color: var(--accent); }
        .hero {
            height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), url('assets/images/IMG5.jpg') center/cover no-repeat;
        }
        .hero h1 { font-family: 'Noto Serif SC', serif; font-size: clamp(3rem, 8.5vw, 5.8rem); line-height: 1.05; }
        .hero .en { font-size: 1.38rem; color: var(--text-dim); margin-top: 12px; }

        .section { padding: 130px 8% 120px; }
        .work-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(360px, 1fr)); gap: 38px; }
        .work-card {
            position: relative; overflow: hidden; border-radius: 28px; cursor: pointer; transition: all 0.7s cubic-bezier(0.23,1,0.32,1);
        }
        .work-card:hover { transform: translateY(-16px); }
        .work-card img { width: 100%; aspect-ratio: 16/9; object-fit: cover; transition: transform 1.1s ease; }
        .work-card:hover img { transform: scale(1.1); }
        .work-overlay { position: absolute; bottom: 0; left: 0; right: 0; padding: 34px 30px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); }

        footer { padding: 120px 8% 80px; text-align: center; color: var(--text-dim); }
        @media (max-width: 768px) {
            .work-grid { grid-template-columns: 1fr; gap: 32px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">UNIQUE VISION.</a>
        <div>
            <a href="index.html" class="nav-item">HOME / 首页</a>
            <a href="photography.html" class="nav-item">PHOTOGRAPHY / 摄影</a>
            <a href="video.html" class="nav-item active">VIDEO / 视频</a>
        </div>
        <a href="index.html" style="color:var(--accent);">← BACK / 返回首页</a>
    </nav>

    <section class="hero">
        <div>
            <h1>动态的光影故事</h1>
            <div class="en">Stories in Motion</div>
        </div>
    </section>

    <section class="section">
        <h2 style="font-family:'Noto Serif SC',serif; font-size:3.5rem; text-align:center; margin-bottom:12px;">Video Works</h2>
        <div style="font-size:1.4rem; color:var(--text-dim); text-align:center; margin-bottom:70px;">视频作品</div>
        <div class="work-grid" id="videoGrid"></div>
    </section>

    <footer>
        © 2026 Unique Vision • 李七<br>
        Made with passion in Tokyo
    </footer>

    <script>
        const videoWorks = [
            {src: "assets/images/IMG__10.jpg", title: "东京雨季", titleEn: "Tokyo Rainy Season", desc: "人文短片 · 2025"},
            {src: "assets/images/IMG__11.jpg", title: "光影实验", titleEn: "Light & Shadow Experiment", desc: "实验影像 · 2025"},
            {src: "assets/images/IMG__12.jpg", title: "日常流动", titleEn: "Flow of Daily Life", desc: "生活纪录 · 2024"},
            {src: "assets/images/IMG__13.jpg", title: "品牌叙事", titleEn: "Brand Narrative", desc: "商业短片 · 2025"}
        ];

        function renderVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';
            videoWorks.forEach(work => {
                const card = document.createElement('div');
                card.className = 'work-card';
                card.innerHTML = `
                    <img src="${work.src}" loading="lazy">
                    <div class="work-overlay">
                        <div style="color:var(--accent);">VIDEO</div>
                        <div style="font-size:1.52rem; margin:12px 0 6px;">${work.title}</div>
                        <div style="font-size:1rem; color:var(--text-dim);">${work.titleEn}</div>
                        <div style="margin-top:12px; color:var(--text-dim);">${work.desc}</div>
                    </div>
                `;
                card.onclick = () => alert(`【${work.title}】\n${work.titleEn}\n\n视频播放即将上线\n（可后续替换为真实视频文件或嵌入链接）`);
                grid.appendChild(card);
            });
        }
        window.onload = renderVideos;
    </script>
</body>
</html>
